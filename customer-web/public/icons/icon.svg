<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="100%" style="stop-color:#FF8C42"/>
    </linearGradient>
    <linearGradient id="wheelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2D2D2D"/>
      <stop offset="100%" style="stop-color:#444"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="rgba(0,0,0,0.2)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="120" fill="url(#bgGrad)"/>

  <!-- Decorative circles top right -->
  <circle cx="420" cy="80" r="60" fill="rgba(255,255,255,0.07)"/>
  <circle cx="440" cy="60" r="30" fill="rgba(255,255,255,0.05)"/>

  <!-- Speed lines (left) -->
  <rect x="30" y="230" width="70" height="8" rx="4" fill="rgba(255,255,255,0.25)"/>
  <rect x="40" y="250" width="50" height="6" rx="3" fill="rgba(255,255,255,0.18)"/>
  <rect x="50" y="268" width="35" height="5" rx="2.5" fill="rgba(255,255,255,0.12)"/>

  <!-- === SCOOTER === -->
  <!-- Rear wheel -->
  <circle cx="165" cy="320" r="52" fill="url(#wheelGrad)" filter="url(#shadow)"/>
  <circle cx="165" cy="320" r="36" fill="#222"/>
  <circle cx="165" cy="320" r="14" fill="#FF6B35"/>
  <circle cx="165" cy="320" r="7" fill="white"/>
  <!-- Wheel spokes -->
  <line x1="165" y1="284" x2="165" y2="356" stroke="rgba(255,255,255,0.3)" stroke-width="2.5"/>
  <line x1="129" y1="320" x2="201" y2="320" stroke="rgba(255,255,255,0.3)" stroke-width="2.5"/>
  <line x1="140" y1="295" x2="190" y2="345" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  <line x1="190" y1="295" x2="140" y2="345" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>

  <!-- Front wheel -->
  <circle cx="355" cy="320" r="52" fill="url(#wheelGrad)" filter="url(#shadow)"/>
  <circle cx="355" cy="320" r="36" fill="#222"/>
  <circle cx="355" cy="320" r="14" fill="#FF6B35"/>
  <circle cx="355" cy="320" r="7" fill="white"/>
  <!-- Wheel spokes -->
  <line x1="355" y1="284" x2="355" y2="356" stroke="rgba(255,255,255,0.3)" stroke-width="2.5"/>
  <line x1="319" y1="320" x2="391" y2="320" stroke="rgba(255,255,255,0.3)" stroke-width="2.5"/>
  <line x1="330" y1="295" x2="380" y2="345" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  <line x1="380" y1="295" x2="330" y2="345" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>

  <!-- Body frame -->
  <path d="M180 290 Q200 240 260 225 L340 230 L370 270 L350 290 Z"
    fill="white" opacity="0.95" filter="url(#shadow)"/>

  <!-- Seat area -->
  <path d="M185 255 Q210 220 270 210 L280 225 Q220 235 200 270 Z"
    fill="rgba(255,255,255,0.6)"/>

  <!-- Front fork -->
  <path d="M345 230 L360 270 L365 290" stroke="white" stroke-width="10"
    stroke-linecap="round" fill="none" opacity="0.9"/>

  <!-- Handlebar -->
  <rect x="348" y="185" width="10" height="55" rx="5" fill="white" opacity="0.9"/>
  <rect x="330" y="182" width="46" height="12" rx="6" fill="white" opacity="0.9"/>

  <!-- Exhaust -->
  <path d="M165 295 Q140 300 125 310" stroke="rgba(255,255,255,0.5)"
    stroke-width="6" stroke-linecap="round" fill="none"/>

  <!-- === FOOD BAG on scooter === -->
  <rect x="215" y="155" width="100" height="85" rx="14" fill="white" filter="url(#shadow)"/>
  <rect x="221" y="161" width="88" height="73" rx="11" fill="rgba(255,107,53,0.08)"/>
  <!-- Bag handle -->
  <path d="M245 155 Q265 132 285 155" stroke="white" stroke-width="7"
    stroke-linecap="round" fill="none"/>
  <!-- PE monogram -->
  <text x="265" y="212" font-size="30" font-weight="900" fill="#FF6B35"
    text-anchor="middle" font-family="Arial Black, sans-serif">PE</text>
  <!-- Small fork & knife icon -->
  <text x="265" y="184" font-size="16" text-anchor="middle">🍴</text>

  <!-- === TEXT === -->
  <!-- PARKENT -->
  <text x="256" y="406" font-size="46" font-weight="900" fill="white"
    text-anchor="middle" font-family="Arial Black, Helvetica, sans-serif"
    letter-spacing="2">PARKENT</text>
  <!-- EXPRESS underline bar -->
  <rect x="108" y="414" width="296" height="3" rx="1.5" fill="rgba(255,255,255,0.4)"/>
  <!-- EXPRESS -->
  <text x="256" y="452" font-size="26" fill="white" text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif" letter-spacing="8"
    opacity="0.92">EXPRESS</text>
  <!-- Delivery dot accent -->
  <circle cx="256" cy="472" r="4" fill="rgba(255,255,255,0.5)"/>
</svg>
