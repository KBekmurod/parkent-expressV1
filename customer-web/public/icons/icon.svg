<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF5722"/>
      <stop offset="100%" style="stop-color:#FF8C00"/>
    </linearGradient>
    <linearGradient id="runner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF3D00"/>
      <stop offset="100%" style="stop-color:#FF8C00"/>
    </linearGradient>
    <linearGradient id="box" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB300"/>
      <stop offset="100%" style="stop-color:#FF8F00"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- Inner glow -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>

  <!-- Speed lines (left) -->
  <path d="M60 210 L155 210" stroke="rgba(255,255,255,0.5)" stroke-width="7" stroke-linecap="round"/>
  <path d="M75 235 L150 235" stroke="rgba(255,255,255,0.35)" stroke-width="5" stroke-linecap="round"/>
  <path d="M90 258 L148 258" stroke="rgba(255,255,255,0.22)" stroke-width="4" stroke-linecap="round"/>

  <!-- Runner body (yuguruvchi) -->
  <!-- Head (bosh) -->
  <circle cx="305" cy="135" r="28" fill="url(#runner)"/>
  <!-- Cap -->
  <path d="M278 128 Q305 105 332 128" fill="#CC2200" stroke="none"/>
  <rect x="268" y="126" width="74" height="8" rx="4" fill="#CC2200"/>

  <!-- Body -->
  <path d="M285 162 Q290 200 280 230 Q275 250 265 270" stroke="url(#runner)" stroke-width="22" fill="none" stroke-linecap="round"/>

  <!-- Right arm (quti tutgan qo'l) -->
  <path d="M295 175 Q330 160 355 155" stroke="url(#runner)" stroke-width="18" fill="none" stroke-linecap="round"/>

  <!-- Left arm (orqada) -->
  <path d="M285 185 Q255 195 240 210" stroke="url(#runner)" stroke-width="16" fill="none" stroke-linecap="round"/>

  <!-- Right leg (oldinda) -->
  <path d="M275 265 Q268 295 255 318 Q248 333 242 345" stroke="url(#runner)" stroke-width="18" fill="none" stroke-linecap="round"/>
  <!-- Shoe right -->
  <path d="M242 345 Q228 350 215 348" stroke="url(#runner)" stroke-width="14" fill="none" stroke-linecap="round"/>

  <!-- Left leg (orqada) -->
  <path d="M278 268 Q295 290 310 308" stroke="#CC2200" stroke-width="16" fill="none" stroke-linecap="round"/>
  <!-- Shoe left -->
  <path d="M310 308 Q325 300 335 305" stroke="#CC2200" stroke-width="12" fill="none" stroke-linecap="round"/>

  <!-- Box (quti) -->
  <rect x="345" y="120" width="65" height="58" rx="6" fill="url(#box)"/>
  <rect x="345" y="120" width="65" height="12" rx="6" fill="#FF8F00"/>
  <!-- Box ribbon -->
  <line x1="377" y1="120" x2="377" y2="178" stroke="#FF6F00" stroke-width="3"/>
  <!-- Steam (bug') -->
  <path d="M360 115 Q365 100 360 88" stroke="rgba(255,220,100,0.9)" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M377 110 Q382 95 377 83" stroke="rgba(255,220,100,0.8)" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M394 115 Q399 100 394 88" stroke="rgba(255,220,100,0.7)" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- PARKENT text -->
  <text x="256" y="400" 
    font-family="Arial Black, Helvetica Neue, sans-serif"
    font-size="52" font-weight="900"
    fill="white" text-anchor="middle"
    letter-spacing="1">PARKENT</text>

  <!-- EXPRESS with speed lines -->
  <path d="M95 415 L148 415" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <path d="M364 415 L418 415" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <text x="256" y="445"
    font-family="Arial Black, Helvetica Neue, sans-serif"
    font-size="40" font-weight="900"
    fill="white" text-anchor="middle"
    letter-spacing="3">EXPRESS</text>
</svg>
