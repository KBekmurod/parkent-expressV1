<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B00"/>
      <stop offset="100%" stop-color="#CC2200"/>
    </linearGradient>
    <linearGradient id="runner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF7B00"/>
      <stop offset="100%" stop-color="#CC1100"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Speed lines (left) - logodagi uslubda -->
  <path d="M48 220 L155 220" stroke="rgba(255,255,255,0.75)" stroke-width="18" stroke-linecap="round"/>
  <path d="M60 252 L148 252" stroke="rgba(255,255,255,0.50)" stroke-width="13" stroke-linecap="round"/>
  <path d="M75 282 L145 282" stroke="rgba(255,255,255,0.30)" stroke-width="9"  stroke-linecap="round"/>

  <!-- Logodagi yugurayotgan kuryer (oq rang) -->
  <!-- Head -->
  <circle cx="315" cy="118" r="35" fill="white"/>
  <!-- Cap -->
  <ellipse cx="315" cy="112" rx="38" ry="12" fill="rgba(255,255,255,0.5)"/>

  <!-- Body torso -->
  <path d="M297 155 Q292 200 278 245 Q270 268 262 290"
        stroke="white" stroke-width="30" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right arm (holding box) -->
  <path d="M307 178 Q350 160 375 150"
        stroke="white" stroke-width="24" fill="none" stroke-linecap="round"/>

  <!-- Left arm (swing) -->
  <path d="M292 180 Q255 200 238 222"
        stroke="white" stroke-width="20" fill="none" stroke-linecap="round"/>

  <!-- Delivery box -->
  <rect x="363" y="118" width="76" height="62" rx="10" fill="white"/>
  <!-- Box lines -->
  <line x1="363" y1="145" x2="439" y2="145" stroke="rgba(200,60,0,0.35)" stroke-width="4"/>
  <line x1="401" y1="118" x2="401" y2="180" stroke="rgba(200,60,0,0.35)" stroke-width="4"/>
  <!-- Steam above box -->
  <path d="M388 112 Q392 100 388 90" stroke="rgba(255,255,255,0.75)" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M407 108 Q411 95 407 84" stroke="rgba(255,255,255,0.50)" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Front leg -->
  <path d="M268 288 Q262 335 257 375 Q253 398 247 416"
        stroke="white" stroke-width="26" fill="none" stroke-linecap="round"/>

  <!-- Back leg -->
  <path d="M273 286 Q290 325 306 355 Q316 376 318 398"
        stroke="white" stroke-width="24" fill="none" stroke-linecap="round"/>

  <!-- Front foot -->
  <path d="M243 412 Q231 428 217 430 Q203 432 200 422"
        stroke="white" stroke-width="20" fill="none" stroke-linecap="round"/>

  <!-- Back foot -->
  <path d="M316 396 Q332 408 345 406 Q358 404 358 394"
        stroke="white" stroke-width="20" fill="none" stroke-linecap="round"/>
</svg>
